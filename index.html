<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para o meu Ben 💜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Georgia, serif;
        }
        body {
            background: linear-gradient(135deg, #fce4ec, #f8bbd0, #e1bee7);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        .container {
            text-align: center;
            animation: fade 2s ease-in-out;
            z-index: 10;
        }
        h1 {
            font-size: 55px;
            color: #8e245f;
            margin-bottom: 20px;
        }
        p {
            color: #5c3455;
            font-size: 22px;
            margin-bottom: 40px;
        }
        button {
            background: #b83280;
            color: white;
            border: none;
            padding: 18px 45px;
            font-size: 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: .3s;
            box-shadow: 0 4px 15px rgba(184, 50, 128, 0.3);
        }
        button:hover {
            transform: scale(1.08);
            background: #962b6b;
        }
        .cora {
            position: absolute;
            color: #ff4f9a;
            font-size: 24px;
            bottom: -50px;
            pointer-events: none;
            animation: subir 4s linear forwards;
        }
        @keyframes fade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes subir {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-110vh) translateX(var(--md-x)) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Para o meu Ben 💜</h1>
        <p>Você é a minha pessoa favorita no mundo inteiro.</p>
        <button onclick="criarCoracao()">Clique aqui</button>
    </div>

    <script>
        function criarCoracao() {
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const coracao = document.createElement('div');
                    coracao.classList.add('cora');
                    coracao.innerHTML = '💜';
                    
                    // Posição horizontal aleatória
                    coracao.style.left = Math.random() * 100 + 'vw';
                    
                    // Tamanho aleatório do coração
                    coracao.style.fontSize = Math.random() * 20 + 15 + 'px';
                    
                    // Velocidade da animação aleatória
                    coracao.style.animationDuration = Math.random() * 2 + 3 + 's';
                    
                    // Direção do balanço horizontal
                    const direcaoX = (Math.random() - 0.5) * 200;
                    coracao.style.setProperty('--md-x', `${direcaoX}px`);
                    
                    document.body.appendChild(coracao);
                    
                    // Remove o elemento após o fim da animação
                    setTimeout(() => {
                        coracao.remove();
                    }, 5000);
                }, i * 100);
            }
        }
    </script>

</body>
</html>
